[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:api_server]
command=python api_server.py
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/api_server.err.log
stdout_logfile=/var/log/api_server.out.log
environment=PYTHONUNBUFFERED="1"

[program:agent_worker]
command=python agent.py start
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/agent.err.log
stdout_logfile=/var/log/agent.out.log
environment=PYTHONUNBUFFERED="1"
